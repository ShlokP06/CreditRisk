services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: credit_risk
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - risk-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit_risk"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build: ./services/ingestion
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://credit:credit@postgres:5432/credit_risk
      - TRANSACTION_CSV_PATH=/data/train_transaction.csv
      - IDENTITY_CSV_PATH=/data/train_identity.csv
    volumes:
      - ./data/raw:/data:ro
    networks:
      - risk-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 20

  feature:
    build: ./services/feature
    ports:
      - "8002:8002"
    networks:
      - risk-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  scoring:
    build: ./services/scoring
    ports:
      - "8003:8003"
    environment:
      - MODEL_PATH=/app/model/model.pkl
    volumes:
      - ./services/scoring/model:/app/model:ro
    networks:
      - risk-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert:
    build: ./services/alert
    ports:
      - "8004:8004"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALERT_THRESHOLD=0.7
    networks:
      - risk-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      - FEATURE_URL=http://feature:8002
      - SCORING_URL=http://scoring:8003
      - ALERT_URL=http://alert:8004
      - INGESTION_URL=http://ingestion:8001
      - ALERT_THRESHOLD=0.7
    depends_on:
      feature:
        condition: service_healthy
      scoring:
        condition: service_healthy
      alert:
        condition: service_healthy
    networks:
      - risk-net

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8000
    networks:
      - risk-net
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - risk-net
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - risk-net
    depends_on:
      - prometheus

networks:
  risk-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
